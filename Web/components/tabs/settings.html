<div id="section-settings" class="dash-panel">
                        <h3 style="margin-top: 0; font-size: 24px; font-weight: 700; margin-bottom: 24px;">Settings</h3>
                        
                        <div style="background: #1E1F22; border: 1px solid #313338; border-radius: 8px; margin-bottom: 24px;">
                            <div style="padding: 16px; border-bottom: 1px solid #313338;">
                                <h4 style="margin: 0; font-size: 16px; font-weight: 600; color: #F2F3F5;">Bot Managers</h4>
                            </div>
                            <div style="padding: 16px;">
                                <label style="display: block; font-weight: 600; color: #F2F3F5; margin-bottom: 4px;">Bot Manager Roles</label>
                                <p style="color: #949BA4; font-size: 12px; margin-top: 0; margin-bottom: 12px;">Roles that can access the Dashboard and reset XP.</p>

                                <p style="color: #949BA4; font-size: 12px; margin-top: 0; margin-bottom: 12px;">The timezone used for time-based features.</p>
                                <select id="settings_timezone" style="width: 100%; background: #111214; border: 1px solid #313338; color: #DBDEE1; padding: 10px 12px; border-radius: 4px; appearance: none;">

                            </div>
